<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Roll Story</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="login-wrapper">
    <div class="card login-card">
        <div class="login-logo">ROLL STORY</div>
        <p class="login-sub">Admin Panel</p>
        <form id="login-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" style="width:100%">Login</button>
        </form>
        <p id="error-msg" class="error-msg" style="display:none">Autentificare eșuată!</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/env.js"></script>
    <script src="/js/supabase-client.js"></script>
    <script>
    (async () => {
        const { data } = await sb.auth.getSession();
        if (data.session) window.location.href = '/admin/index.html';
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById('error-msg');
        errorEl.style.display = 'none';

        const email = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        try {
            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (error || !data.session) throw error || new Error('No session');

            const { data: profile } = await sb
                .from('admin_profiles')
                .select('user_id')
                .eq('user_id', data.session.user.id)
                .maybeSingle();

            if (!profile) {
                await sb.auth.signOut();
                throw new Error('Not an admin');
            }

            window.location.href = '/admin/index.html';
        } catch (err) {
            errorEl.style.display = 'block';
        }
    });
    </script>
</body>
</html>
